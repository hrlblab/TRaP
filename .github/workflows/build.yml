name: Build TRaP

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyqt5 scipy numpy pandas matplotlib openpyxl pyinstaller

      - name: Build
        run: python build_exe.py pyinstaller

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TRaP-Windows
          path: dist/TRaP/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyqt5 scipy numpy pandas matplotlib openpyxl pyinstaller

      - name: Build
        run: python build_exe.py pyinstaller

      - name: Zip .app for upload
        run: |
          cd dist
          zip -r TRaP-macOS.zip TRaP.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TRaP-macOS
          path: dist/TRaP-macOS.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TRaP-Windows
          path: artifacts/windows/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TRaP-macOS
          path: artifacts/macos/

      - name: Zip Windows build
        run: |
          cd artifacts/windows
          zip -r ../../TRaP-Windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TRaP-Windows.zip
            artifacts/macos/TRaP-macOS.zip
